services:
  # --- YOUR NEXT.JS APP ---
  web:
    build: .
    container_name: my-next-app
    ports:
      - "3000:3000"
    environment:
      # The connection string to your MongoDB container
      - MONGODB_URI=${MONGODB_URI}

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s   
      timeout: 10s        
      retries: 3          
      start_period: 20s

