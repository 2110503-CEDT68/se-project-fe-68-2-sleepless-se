services:
  web:
    build: .
    container_name: my-next-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app                 # Bind mount for hot reloading
      - /app/node_modules      # Keeps container modules separate from host
    env_file:
      - .env
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: my-mongodb
    volumes:
      - mongo-store:/data/db 
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-store:              